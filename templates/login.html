{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row g-0 justify-content-center align-items-center shadow-lg rounded-4 overflow-hidden bg-white"
    style="min-height: 70vh; margin-top: 5vh;">
    <!-- Left Side - Image -->
    <div class="col-md-6 d-none d-md-block h-100" style="min-height: 70vh;">
        <img src="{{ url_for('static', filename='img/login.png') }}" class="img-fluid w-100 h-100"
            style="object-fit: cover;" alt="Scenic Railway">
    </div>

    <!-- Right Side - Form -->
    <div class="col-md-6 p-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">TrackBook</h2>
            <p class="text-muted">Welcome back! Please login to your account.</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label fw-bold small text-uppercase">Username</label>
                <input type="text" class="form-control form-control-lg bg-light border-0" id="username" name="username"
                    required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label fw-bold small text-uppercase">Password</label>
                <input type="password" class="form-control form-control-lg bg-light border-0" id="password"
                    name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill shadow-sm">Login</button>
        </form>

        <div class="mt-4 text-center">
            <p class="text-muted">Don't have an account? <a href="{{ url_for('auth.register') }}"
                    class="fw-bold text-primary text-decoration-none">Register Now</a></p>
        </div>
    </div>
</div>
{% endblock %}
